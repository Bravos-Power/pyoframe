repeat: 1 # TODO repeat
timeout: 1200 # seconds, per run
name: "main"
problems:
  simple_problem:
    label: "Simple Problem"
    size: [10000, 100000, 1000000, 10000000, 50000000]
    inputs:
      - "input_10000.parquet"
      - "input_100000.parquet"
      - "input_1000000.parquet"
      - "input_10000000.parquet"
      - "input_50000000.parquet"
  facility_location:
    label: "Facility Location Problem (from JuMP paper)"
    size: [16, 32, 64, 128, 192]
    construct_only: true
  energy_planning_capacity_expansion:
    label: "Electrical Grid Capacity Expansion Problem"
    code_dir: energy_planning
    inputs: "*"
    size: [2, 4, 24, 168, 336]
    args:
      security_constrained: false
      capacity_expansion: true
    solver_args:
      Method: 2
      Crossover: false
  energy_planning_security_constrained_dispatch:
    label: "Electrical Grid Dispatch Problem"
    code_dir: energy_planning
    inputs: "*"
    size: [2, 4, 24, 48, 72, 168]
    args:
      security_constrained: true
      capacity_expansion: false
    solver_args:
      Method: 2
      Crossover: false

solvers:
  - gurobi
  # - highs
  # - mosek

libraries:
  - pyoframe
  - pyomo
  - cvxpy
  - gurobipy
  - jump
  - linopy
  - pyoptinterface
  - pulp
  - ampl
